name: Build

on:
  push:
    branches: [ "main", "dev", "ci" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_HARDLINK: "true"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "10G"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "build-tools;36.1.0 ndk;27.3.13750724 platforms;android-36"

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8 -XX:+UseParallelGC' >> ~/.gradle/gradle.properties
          echo 'android.native.buildOutput=verbose' >> ~/.gradle/gradle.properties

      - name: Configure local.properties
        run: |
          echo "apiId=21724" >> local.properties
          echo "apiHash=3e0cb5efcd52300aec5994fdfc5bdc16" >> local.properties
          echo "helperBotId=0" >> local.properties
          echo "helperBotUsername=" >> local.properties
          echo "sentryDsn=" >> local.properties
          echo "mapsApiKey=" >> local.properties

      - name: Configure google-services.json
        run: |
          echo "" | base64 --decode > TMessagesProj_App/google-services.json

      - name: Build debug APK 
        run: |
         chmod +xrw gradlew
         ./gradlew assembleDebug --no-build-cache

      - name: Upload debug APKs
        uses: actions/upload-artifact@v7
        with:
          name: nekogram-ayugram-debug-apks
          path: TMessagesProj_App/build/outputs/apk/debug/*.apk
